<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PTT 中職活動監控工具 v7</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root{--bg:#f6f8fb;--card:#fff;--text:#10233f;--muted:#6b7280;--line:#d9e0ea;--accent:#2563eb;--ok:#16a34a;--warn:#d97706;--bad:#dc2626}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;color:var(--text)}
    .wrap{max-width:1280px;margin:0 auto;padding:24px} h1{margin:0 0 8px;font-size:28px}.sub{color:var(--muted);margin-bottom:18px}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 8px 24px rgba(16,35,63,.04)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.grow{flex:1;min-width:260px}
    button{border:0;border-radius:12px;background:var(--accent);color:white;padding:10px 14px;font-weight:700;cursor:pointer}button.secondary{background:#e5eaf3;color:#10233f}button:disabled{opacity:.55;cursor:not-allowed}.sheetBtn{display:inline-block;border-radius:12px;background:#16a34a;color:white;padding:10px 14px;font-weight:700;text-decoration:none}.ocrText{width:100%;min-height:110px;margin-top:10px;white-space:pre-wrap}.progress{height:8px;background:#e5eaf3;border-radius:99px;overflow:hidden;margin-top:8px}.bar{height:100%;width:0%;background:var(--accent);transition:width .2s}
    input,select,textarea{border:1px solid var(--line);border-radius:12px;padding:10px 12px;font:inherit;background:#fff}label{font-size:14px;color:var(--muted)}
    table{width:100%;border-collapse:separate;border-spacing:0;background:white;border:1px solid var(--line);border-radius:18px;overflow:hidden}th,td{padding:14px 16px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#f9fbfe;font-weight:800;white-space:nowrap}tr:last-child td{border-bottom:0}
    .small{font-size:13px;color:var(--muted)}.status{display:inline-block;padding:4px 10px;border-radius:99px;background:#eef2ff;color:#3730a3;font-weight:700;font-size:13px}.status.ok{background:#dcfce7;color:#166534}.status.warn{background:#ffedd5;color:#9a3412}.empty{padding:36px;text-align:center;color:var(--muted)}
    a{color:#2563eb;text-decoration:none}.source{min-width:130px}.nowrap{white-space:nowrap}.theme{font-weight:800}.summary{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.5}.toolbar{justify-content:space-between}.msg{font-size:14px;color:var(--muted)}
    @media(max-width:760px){.wrap{padding:12px}table,thead,tbody,tr,th,td{display:block}thead{display:none}tr{border-bottom:1px solid var(--line);padding:10px}td{border:0;padding:7px 8px}td::before{content:attr(data-label);display:block;font-size:12px;color:var(--muted);margin-bottom:3px}}
  </style>
</head>
<body>
<div class="wrap">
  <h1>PTT 中職活動監控工具</h1>
  <div class="sub">GitHub Pages 前端 + Google Apps Script 後端。抓取後會同步到指定 Google Sheet，方便你手動補資料。</div>

  <div class="panel">
    <div class="row toolbar">
      <div class="row">
        <button id="scanBtn" onclick="scanNow()">重新抓取並同步 Sheet</button>
        <button class="secondary" onclick="loadSheet()">讀取 Sheet 現有資料</button>
        <a class="sheetBtn" target="_blank" href="https://docs.google.com/spreadsheets/d/1bHxuXSEbQczmWRwaVoT75HOJ4m3Z5EwaNp7QqUyE10k/edit">開啟 Google Sheet</a>
        <label>PTT頁數 <select id="pages"><option>1</option><option>2</option><option selected>3</option><option>5</option><option>8</option></select></label>
        <label><input type="checkbox" id="includePtt" checked> PTT</label>
        <label><input type="checkbox" id="includeOfficial" checked> 官方來源</label>
      </div>
      <div class="msg" id="message">尚未抓取</div>
    </div>
  </div>

  <div class="panel">
    <div class="row">
      <input id="importUrl" class="grow" placeholder="貼上 PTT / 新聞 / 官方活動連結，可匯入並同步 Sheet" />
      <button class="secondary" onclick="importLink()">匯入連結</button>
    </div>
    <div class="small" style="margin-top:8px">FB / IG 連結通常抓不到內容；建議改貼文字、截圖 OCR，或手動在 Sheet 補資料。</div>
  </div>

  <div class="panel">
    <strong>圖片 OCR 匯入</strong>
    <div class="small" style="margin-top:6px">可上傳活動海報、啦啦隊班表截圖。辨識在瀏覽器端執行，不使用 OpenAI API；辨識後會同步到 Google Sheet。</div>
    <div class="row" style="margin-top:10px">
      <input type="file" id="ocrFile" accept="image/*" />
      <button class="secondary" id="ocrBtn" onclick="runOcr()">辨識圖片並同步 Sheet</button>
    </div>
    <div class="progress"><div id="ocrBar" class="bar"></div></div>
    <div id="ocrStatus" class="small" style="margin-top:8px">尚未辨識圖片。</div>
    <textarea id="ocrText" class="ocrText" placeholder="OCR 辨識出的文字會顯示在這裡，可複製到 Sheet 輔助修正。"></textarea>
  </div>

  <div class="panel">
    <div class="row">
      <input id="filter" class="grow" placeholder="搜尋球隊、主題日、成員、地點、來源..." oninput="render()" />
      <button class="secondary" onclick="exportCsv()">匯出 CSV</button>
      <a id="sheetLink" target="_blank" href="https://docs.google.com/spreadsheets/d/1bHxuXSEbQczmWRwaVoT75HOJ4m3Z5EwaNp7QqUyE10k/edit">Google Sheet</a>
    </div>
  </div>

  <div id="tableWrap"></div>
</div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbz55AVpqtUmTxdbV50pSPJntgonJcOM3CQv1lySRgOyxAgPbK7Jtl9p_yUmbalD1_RE/exec";
let items = [];
let loading = false;

function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const s=document.createElement('script');
    const qs=new URLSearchParams({...params,callback:cb}).toString();
    window[cb]=(data)=>{cleanup();resolve(data)};
    s.onerror=()=>{cleanup();reject(new Error('連線失敗'))};
    function cleanup(){delete window[cb];s.remove()}
    s.src=GAS_API_URL+'?'+qs;
    document.body.appendChild(s);
  });
}

async function scanNow(){
  setLoading(true,'抓取中，會同步到 Google Sheet...');
  try{
    const data=await jsonp({action:'scan',pages:document.getElementById('pages').value,ptt:document.getElementById('includePtt').checked?'1':'0',official:document.getElementById('includeOfficial').checked?'1':'0',sync:'1'});
    if(!data.ok) throw new Error(data.error||'抓取失敗');
    items=data.items||[];
    const added=data.sheet?`，Sheet 新增 ${data.sheet.added} 筆，總計 ${data.sheet.total} 筆`:'';
    setMsg(`完成：抓到 ${items.length} 筆${added}`);
    render();
  }catch(e){setMsg('錯誤：'+e.message)}finally{setLoading(false)}
}

async function loadSheet(){
  setLoading(true,'讀取 Sheet 中...');
  try{
    const data=await jsonp({action:'getSheet'});
    if(!data.ok) throw new Error(data.error||'讀取失敗');
    items=data.items||[];
    setMsg(`已讀取 Sheet：${items.length} 筆`);
    render();
  }catch(e){setMsg('錯誤：'+e.message)}finally{setLoading(false)}
}

async function importLink(){
  const url=document.getElementById('importUrl').value.trim();
  if(!url){setMsg('請先貼上連結');return}
  setLoading(true,'匯入連結中...');
  try{
    const data=await jsonp({action:'importLink',url:url,sync:'1'});
    if(!data.ok) throw new Error(data.error||'匯入失敗');
    if(data.item) items.unshift(data.item);
    const added=data.sheet?`，Sheet 新增 ${data.sheet.added} 筆`:'';
    setMsg('匯入完成'+added);
    render();
  }catch(e){setMsg('錯誤：'+e.message+'；如果是 FB / IG 連結，建議改用截圖 OCR 或直接到 Sheet 補資料')}finally{setLoading(false)}
}

async function runOcr(){
  const file=document.getElementById('ocrFile').files[0];
  if(!file){setMsg('請先選擇圖片');return}
  if(!window.Tesseract){setMsg('OCR 程式載入失敗，請確認網路可以連到 jsDelivr');return}
  const btn=document.getElementById('ocrBtn');
  btn.disabled=true; btn.textContent='辨識中...'; setOcr(2,'準備辨識圖片...');
  try{
    const result=await Tesseract.recognize(file,'chi_tra+eng',{logger:m=>{
      if(m.status){const pct=Math.round((m.progress||0)*100);setOcr(Math.max(2,pct),`${m.status} ${pct}%`)}
    }});
    const text=(result.data&&result.data.text)||'';
    document.getElementById('ocrText').value=text;
    const item=parseTextToItem(text,{source:'圖片OCR',rawTitle:file.name,status:'待確認',confidence:'OCR'});
    const data=await jsonp({action:'importItem',date:item.date,place:item.place,team:item.team,theme:item.theme,cheerMembers:item.cheerMembers,status:item.status,source:item.source,confidence:item.confidence,summary:item.summary,rawTitle:item.rawTitle,sync:'1'});
    if(!data.ok) throw new Error(data.error||'同步失敗');
    if(data.item) items.unshift(data.item);
    setOcr(100,'OCR 完成，已同步到 Google Sheet。若欄位有誤，請直接到 Sheet 修正。');
    setMsg(`圖片 OCR 匯入完成，Sheet 新增 ${data.sheet?data.sheet.added:0} 筆`);
    render();
  }catch(e){setMsg('OCR 錯誤：'+e.message);setOcr(0,'OCR 失敗')}
  finally{btn.disabled=false;btn.textContent='辨識圖片並同步 Sheet'}
}

function setOcr(pct,msg){document.getElementById('ocrBar').style.width=pct+'%';document.getElementById('ocrStatus').textContent=msg}

function parseTextToItem(text,base={}){
  const t=String(text||'').replace(/\s+/g,' ');
  return {
    date:extractDate(t),
    place:extractPlace(t),
    team:extractTeam(t),
    theme:extractTheme(t,base.rawTitle),
    cheerMembers:extractMembers(t),
    status:base.status||'待確認',
    source:base.source||'圖片OCR',
    confidence:base.confidence||'OCR',
    summary:t.slice(0,120),
    rawTitle:base.rawTitle||'圖片OCR匯入'
  };
}
function extractDate(t){
  const patterns=[/(?:202[0-9][\/.-])?(1[0-2]|0?[1-9])[\/.-](3[01]|[12][0-9]|0?[1-9])(?:\s*[（(]?[日一二三四五六][）)]?)?/,/(1[0-2]|0?[1-9])月(3[01]|[12][0-9]|0?[1-9])日?/];
  for(const re of patterns){const m=t.match(re);if(m){const mo=Number(m[1]),d=Number(m[2]); if(mo>=1&&mo<=12&&d>=1&&d<=31) return `${mo}/${d}`}}
  return '';
}
function extractPlace(t){const places=['台北大巨蛋','臺北大巨蛋','洲際棒球場','台中洲際','臺中洲際','桃園棒球場','樂天桃園棒球場','新莊棒球場','台南棒球場','臺南棒球場','澄清湖棒球場','斗六棒球場','花蓮棒球場'];return places.find(p=>t.includes(p))||''}
function extractTeam(t){const map={'統一獅':['統一獅','統一','Uni-Lions','Uni Girls'],'味全龍':['味全龍','味全','Dragon Beauties','小龍女'],'富邦悍將':['富邦悍將','富邦','Fubon Angels'],'樂天桃猿':['樂天桃猿','樂天','Rakuten Girls','桃猿'],'中信兄弟':['中信兄弟','兄弟','Passion Sisters','PS女孩'],'台鋼雄鷹':['台鋼雄鷹','台鋼','Wing Stars']}; for(const [team,ks] of Object.entries(map)){if(ks.some(k=>t.includes(k)))return team}return ''}
function extractTheme(t,title=''){const src=title+' '+t; const m=src.match(/([^，。\n]{2,24}(?:主題日|女孩日|寵物日|聯名|合作|日))/); return m?m[1].trim():(title||'待確認')}
function extractMembers(t){const known=['籃籃','Yuri','若潼','峮峮','短今','粿粿','李多慧','李雅英','林襄','巫苡萱','慈妹','筠熹','秀秀子','一粒','檸檬','孟潔','瑟七','小安','小白','羚小鹿','菲菲'];return [...new Set(known.filter(n=>t.includes(n)))].join('、')}

function render(){
  const q=document.getElementById('filter').value.trim().toLowerCase();
  const data=items.filter(it=>!q||Object.values(it).join(' ').toLowerCase().includes(q));
  if(!data.length){document.getElementById('tableWrap').innerHTML='<div class="panel empty">目前沒有資料</div>';return}
  const rows=data.map(it=>`<tr>
    <td data-label="日期" class="nowrap">${esc(it.date||'')}</td>
    <td data-label="地點">${esc(it.place||'')}</td>
    <td data-label="球隊">${esc(it.team||'')}</td>
    <td data-label="主題日"><div class="theme">${esc(it.theme||'')}</div><div class="summary">${esc(it.summary||it.rawTitle||'')}</div></td>
    <td data-label="啦啦隊成員">${esc(it.cheerMembers||'')}</td>
    <td data-label="狀態">${statusHtml(it.status)}<div class="small">信心：${esc(it.confidence||0)}｜${esc(it.keywords||'')}</div></td>
    <td data-label="來源" class="source"><a href="${escAttr(it.url||'#')}" target="_blank">${esc(it.source||'來源')}</a></td>
  </tr>`).join('');
  document.getElementById('tableWrap').innerHTML=`<table><thead><tr><th>日期</th><th>地點</th><th>球隊</th><th>主題日</th><th>啦啦隊成員</th><th>狀態</th><th>來源</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function statusHtml(s){
  const cls=s==='官方確認'||s==='已確認'?'ok':(String(s).includes('疑似')?'warn':'');
  return `<span class="status ${cls}">${esc(s||'待確認')}</span>`;
}
function setLoading(v,msg){loading=v;document.getElementById('scanBtn').disabled=v;if(msg)setMsg(msg)}
function setMsg(t){document.getElementById('message').textContent=t}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function escAttr(s){return esc(s).replace(/'/g,'&#39;')}
function exportCsv(){
  const header=['日期','地點','球隊','主題日','啦啦隊成員','狀態','來源','來源連結'];
  const lines=[header].concat(items.map(it=>[it.date,it.place,it.team,it.theme,it.cheerMembers,it.status,it.source,it.url]));
  const csv=lines.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cpbl-events.csv';a.click();URL.revokeObjectURL(a.href);
}
render();
</script>
</body>
</html>
